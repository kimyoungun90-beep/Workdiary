<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>업무일지 AI 자동 작성기</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#6b7280;--line:#e5e7eb;--main:#1867c0;--soft:#eef5ff;--danger:#b91c1c;}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink)}
    header{background:#111827;color:white;padding:22px 26px} header h1{margin:0;font-size:24px} header p{margin:8px 0 0;color:#cbd5e1;font-size:14px}
    main{max-width:1180px;margin:0 auto;padding:22px}
    section{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 8px 22px rgba(15,23,42,.05)}
    h2{font-size:18px;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{display:block;font-size:13px;color:#374151;margin-bottom:6px;font-weight:700} input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px;font-size:14px;background:white} textarea{min-height:92px;resize:vertical;line-height:1.5}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;background:var(--main);color:white} button.secondary{background:#374151} button.light{background:#eef2ff;color:#1f2937;border:1px solid #c7d2fe} button.danger{background:var(--danger)} button:disabled{opacity:.55;cursor:not-allowed}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff;margin:10px 0}.muted{color:var(--muted);font-size:13px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:var(--soft);color:#0f4f9f;font-size:12px;margin-left:6px}
    pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:14px;padding:16px;min-height:220px;line-height:1.55;overflow:auto}.ok{color:#15803d}.err{color:#b91c1c}.hide{display:none}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .task-grid{display:grid;grid-template-columns:1fr 160px 1.5fr 1.5fr 1.2fr 1fr auto;gap:8px;align-items:end}.visit-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1.2fr auto;gap:8px;align-items:end}
    @media(max-width:900px){.grid,.grid2,.task-grid,.visit-grid{grid-template-columns:1fr} main{padding:12px} header{padding:18px}}
  </style>
</head>
<body>
<header>
  <h1>업무일지 AI 자동 작성기</h1>
  <p>입력값을 기준으로 업무내용을 AI가 보고용 문장으로 정리하고, 기존 엑셀 양식에 반영합니다.</p>
</header>
<main>
  <section>
    <h2>1. 기본 정보</h2>
    <div class="grid">
      <div><label>작성일자</label><input id="writeDate" type="date"></div>
      <div><label>업무일자</label><input id="workDate" type="date"></div>
      <div><label>주간 기간</label><input id="weekPeriod" placeholder="예: 5/18(월) ~ 5/24(일)"></div>
      <div><label>담당자</label><select id="manager"></select></div>
    </div>
    <div class="grid2" style="margin-top:12px">
      <div><label>작성 스타일</label><select id="styleMode"></select></div>
      <div><label>매출 표시 담당자</label><select id="salesManager"></select></div>
    </div>
  </section>

  <section>
    <h2>2. 파일 업로드 <span class="pill">선택</span></h2>
    <div class="grid2">
      <div><label>업무일지 빈 양식.xlsx</label><input id="templateFile" type="file" accept=".xlsx,.xls"></div>
      <div><label>코스트코 CE/MX 실적 자동취합.xlsx</label><input id="salesFile" type="file" accept=".xlsx,.xls"></div>
    </div>
    <p class="muted">엑셀 생성까지 테스트할 때만 업로드하면 됩니다. AI 업무내용 생성은 파일 없이도 가능합니다.</p>
  </section>

  <section>
    <h2>3. 직접 입력 영역</h2>
    <div class="grid2">
      <div><label>중점 추진 업무</label><textarea id="priorityWork" placeholder="웹앱에 작성한 내용을 그대로 반영"></textarea></div>
      <div><label>금일 활동계획</label><textarea id="todayPlan" placeholder="웹앱에 작성한 내용을 그대로 반영"></textarea></div>
      <div><label>보고사항 및 특이사항</label><textarea id="specialNote" placeholder="웹앱에 작성한 내용을 그대로 반영"></textarea></div>
      <div><label>매출현황 직접 메모</label><textarea id="salesMemo" placeholder="매출 파일 자동 반영 전 임시 메모"></textarea></div>
    </div>
  </section>

  <section>
    <h2>4. 방문 순서 및 출근 인원</h2>
    <div id="visitsBox"></div>
    <div class="actions"><button class="light" id="addVisitBtn">방문지 추가</button></div>
  </section>

  <section>
    <h2>5. 업무내용 입력</h2>
    <div id="tasksBox"></div>
    <div class="actions"><button class="light" id="addTaskBtn">업무 추가</button><button class="secondary" id="sampleBtn">샘플 입력</button></div>
  </section>

  <section>
    <h2>6. 생성</h2>
    <div class="actions">
      <button id="generateBtn">AI 업무내용 생성</button>
      <button class="secondary" id="copyBtn">결과 복사</button>
      <button class="light" id="excelBtn">엑셀 생성</button>
    </div>
    <p id="status" class="muted"></p>
    <pre id="output">아직 생성된 업무내용이 없습니다.</pre>
  </section>
</main>
<script>
const MANAGERS = ['김영언','심창보','김현래','조재현','윤재경'];
const STYLE_MODES = ['기본 업무일지','보고용 정리','임원 보고용','주간동향 보고용','간단 요약형','상세 기록형'];
const WORK_TYPES = ['진열 점검','VOC 처리','상담사 면담','큐레이터 면담','거래선 미팅','행사 공유','매출 리뷰','교육','신입 면담','퇴직 면담','거래선 상견례','진열 변경 요청','거래선 매출 요청','재고 확인','입고 확인','설치 일정 확인','배송 지연 확인','KSP 포탈 확인','OB 콜 진행','판매 스크립트 점검','세일즈 코칭','우군화 활동','기타'];
const PLACE_PRESETS = ['사무실','코스트코 세종점','코스트코 대전점','코스트코 대구점','코스트코 혁신점','코스트코 양재점','코스트코 광명점','코스트코 공세점','코스트코 평택점','코스트코 상봉점','코스트코 하남점','코스트코 양평점','코스트코 의정부점','코스트코 일산점','코스트코 송도점','코스트코 고척점','코스트코 청라점','코스트코 천안점','코스트코 부산점','코스트코 울산점','코스트코 김해점'];
const $ = (id) => document.getElementById(id);
let visits = [];
let tasks = [];

window.addEventListener('DOMContentLoaded', init);
function init(){
  fillSelect($('manager'), MANAGERS); fillSelect($('salesManager'), MANAGERS); fillSelect($('styleMode'), STYLE_MODES);
  setDefaultDates();
  visits = [{place:'사무실', consultants:'', curators:'', attendanceNote:''},{place:'코스트코 대구점', consultants:'', curators:'', attendanceNote:''}];
  tasks = [{place:'코스트코 대구점', type:'진열 점검', issue:'', action:'', followUp:'', memo:''}];
  renderVisits(); renderTasks();
  $('addVisitBtn').addEventListener('click',()=>{visits.push({place:'',consultants:'',curators:'',attendanceNote:''});renderVisits();});
  $('addTaskBtn').addEventListener('click',()=>{tasks.push({place:'',type:'진열 점검',issue:'',action:'',followUp:'',memo:''});renderTasks();});
  $('sampleBtn').addEventListener('click', loadSample);
  $('generateBtn').addEventListener('click', generateDiary);
  $('copyBtn').addEventListener('click', copyOutput);
  $('excelBtn').addEventListener('click', createExcel);
}
function fillSelect(select, values){ select.innerHTML = values.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join(''); }
function setDefaultDates(){
  const d = new Date(); const yyyy=d.getFullYear(); const mm=String(d.getMonth()+1).padStart(2,'0'); const dd=String(d.getDate()).padStart(2,'0');
  $('writeDate').value=`${yyyy}-${mm}-${dd}`; $('workDate').value=`${yyyy}-${mm}-${dd}`; $('weekPeriod').value=getWeekPeriod(d);
}
function getWeekPeriod(date){
  const d = new Date(date); const day = d.getDay() || 7; const monday = new Date(d); monday.setDate(d.getDate()-day+1); const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const week = ['일','월','화','수','목','금','토']; const fmt = x => `${x.getMonth()+1}/${x.getDate()}(${week[x.getDay()]})`; return `${fmt(monday)} ~ ${fmt(sunday)}`;
}
function renderVisits(){
  $('visitsBox').innerHTML = visits.map((v, i) => `<div class="card visit-grid">
    <div><label>${i+1}차 방문지</label><input list="placeList" data-visit="${i}" data-field="place" value="${esc(v.place)}"></div>
    <div><label>상담사</label><input data-visit="${i}" data-field="consultants" value="${esc(v.consultants)}" placeholder="예: 홍길동, 김철수"></div>
    <div><label>큐레이터</label><input data-visit="${i}" data-field="curators" value="${esc(v.curators)}" placeholder="예: 이영희"></div>
    <div><label>출근 특이사항</label><input data-visit="${i}" data-field="attendanceNote" value="${esc(v.attendanceNote)}" placeholder="예: 전원 정상 출근"></div>
    <button class="danger" data-visit-remove="${i}">삭제</button>
  </div>`).join('') + `<datalist id="placeList">${PLACE_PRESETS.map(p=>`<option value="${esc(p)}"></option>`).join('')}</datalist>`;
  document.querySelectorAll('[data-visit]').forEach(el=>el.addEventListener('input',e=>{const i=Number(e.target.dataset.visit); visits[i][e.target.dataset.field]=e.target.value; renderTasks(false);}));
  document.querySelectorAll('[data-visit-remove]').forEach(el=>el.addEventListener('click',e=>{visits.splice(Number(e.target.dataset.visitRemove),1); renderVisits(); renderTasks();}));
}
function renderTasks(rebind=true){
  const places = [...new Set([...PLACE_PRESETS, ...visits.map(v=>v.place).filter(Boolean), ...tasks.map(t=>t.place).filter(Boolean)])];
  $('tasksBox').innerHTML = tasks.map((t, i) => `<div class="card task-grid">
    <div><label>방문지</label><input list="taskPlaceList" data-task="${i}" data-field="place" value="${esc(t.place)}"></div>
    <div><label>업무유형</label><select data-task="${i}" data-field="type">${WORK_TYPES.map(w=>`<option ${w===t.type?'selected':''} value="${esc(w)}">${esc(w)}</option>`).join('')}</select></div>
    <div><label>이슈사항</label><textarea data-task="${i}" data-field="issue" placeholder="예: TV SYNC 불량">${esc(t.issue)}</textarea></div>
    <div><label>처리 진행</label><textarea data-task="${i}" data-field="action" placeholder="예: SYNC 재연결 조치 완료">${esc(t.action)}</textarea></div>
    <div><label>후속조치</label><textarea data-task="${i}" data-field="followUp" placeholder="예: 재발 여부 추가 확인 예정">${esc(t.followUp)}</textarea></div>
    <div><label>추가 메모</label><textarea data-task="${i}" data-field="memo">${esc(t.memo)}</textarea></div>
    <button class="danger" data-task-remove="${i}">삭제</button>
  </div>`).join('') + `<datalist id="taskPlaceList">${places.map(p=>`<option value="${esc(p)}"></option>`).join('')}</datalist>`;
  document.querySelectorAll('[data-task]').forEach(el=>el.addEventListener('input',e=>{const i=Number(e.target.dataset.task); tasks[i][e.target.dataset.field]=e.target.value;}));
  document.querySelectorAll('[data-task-remove]').forEach(el=>el.addEventListener('click',e=>{tasks.splice(Number(e.target.dataset.taskRemove),1); renderTasks();}));
}
function collectPayload(){
  return { manager:$('manager').value, styleMode:$('styleMode').value, visits, tasks };
}
async function generateDiary(){
  setStatus('AI 업무내용 생성 중...', ''); $('generateBtn').disabled=true;
  try{
    const res = await fetch('/api/generate-diary', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(collectPayload())});
    const data = await res.json(); if(!res.ok) throw new Error(data.error || 'AI 생성 실패');
    $('output').textContent = data.text || '생성 결과가 비어 있습니다.'; setStatus('AI 업무내용 생성 완료', 'ok');
  }catch(err){ setStatus(err.message, 'err'); }
  finally{ $('generateBtn').disabled=false; }
}
function copyOutput(){ navigator.clipboard.writeText($('output').textContent).then(()=>setStatus('복사 완료','ok')).catch(()=>setStatus('복사 실패','err')); }
function loadSample(){
  visits = [{place:'사무실',consultants:'',curators:'',attendanceNote:'오전 보고자료 정리'}, {place:'코스트코 대구점',consultants:'김OO, 박OO',curators:'이OO',attendanceNote:'전원 정상 출근'}, {place:'코스트코 혁신점',consultants:'최OO',curators:'정OO',attendanceNote:'큐레이터 정상 출근'}];
  tasks = [
    {place:'코스트코 대구점',type:'VOC 처리',issue:'UHD 75인치 배송 지연 VOC 강성 발생',action:'CM 소통 후 배송 일정 확인 및 고객 안내 진행',followUp:'배송 완료 여부 추가 확인 예정',memo:''},
    {place:'코스트코 혁신점',type:'진열 점검',issue:'TV SYNC 불량 현상 확인',action:'SYNC 재연결 후 조치 완료',followUp:'재발 여부 차주 재점검 예정',memo:''}
  ]; renderVisits(); renderTasks(); setStatus('샘플 입력 완료','ok');
}
async function createExcel(){
  if(!window.XLSX){ setStatus('XLSX 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하세요.','err'); return; }
  const file = $('templateFile').files[0];
  if(!file){ setStatus('업무일지 빈 양식.xlsx를 먼저 업로드하세요.','err'); return; }
  try{
    const ab = await file.arrayBuffer(); const wb = XLSX.read(ab, {type:'array', cellStyles:true}); const ws = wb.Sheets[wb.SheetNames[0]];
    setCell(ws,'C5',formatDateKo($('writeDate').value)); setCell(ws,'G5',$('manager').value); setCell(ws,'A7',$('weekPeriod').value);
    setCell(ws,'C24',$('priorityWork').value); setCell(ws,'C33',$('output').textContent); setCell(ws,'C55',$('todayPlan').value); setCell(ws,'C63',$('specialNote').value);
    if($('salesMemo').value.trim()) setCell(ws,'C10',$('salesMemo').value.trim());
    XLSX.writeFile(wb, `업무일지_${$('manager').value}_${$('workDate').value || ''}.xlsx`); setStatus('엑셀 생성 완료','ok');
  }catch(err){ setStatus('엑셀 생성 실패: '+err.message,'err'); }
}
function setCell(ws, addr, val){ if(!ws[addr]) ws[addr] = {t:'s', v:''}; ws[addr].t='s'; ws[addr].v=val || ''; ws[addr].w=val || ''; }
function formatDateKo(v){ if(!v) return ''; const [y,m,d]=v.split('-'); return `${y}.${m}.${d}`; }
function setStatus(msg, cls){ $('status').className = cls ? cls : 'muted'; $('status').textContent=msg; }
function esc(s){ return String(s ?? '').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
</script>
</body>
</html>
